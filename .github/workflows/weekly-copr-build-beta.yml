name: Weekly COPR build beta

on:
  schedule:
    - cron: "00 7 * * 1"
  workflow_dispatch:

jobs:
  build_rpm_copr:
    runs-on: ubuntu-latest
    name: Build rpm on COPR
    timeout-minutes: 5
    permissions:
      contents: write
    env:
      CI: "true"
      SPEC_FILE: ./sunshine-beta.spec
      COPR_OWNER: pvermeer
      COPR_PROJECT: sunshine-test
      COPR_PACKAGE: sunshine-beta
      COPR_WEBHOOK: ${{ secrets.COPR_WEBHOOK_BETA }}
      RPM_SPEC_UPDATE: "false"
      COPR_STATUS: "null"

    steps:
      - name: Checkout rpm-tools
        uses: actions/checkout@v4
        with:
          repository: pvermeer/rpm-tools
          path: rpm-tools

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: repo

      - name: Update RPM
        run: |
          cd repo
          ./scripts/update.sh beta
          source $XDG_RUNTIME_DIR/update-vars
          echo "RPM_SPEC_UPDATE=$RPM_SPEC_UPDATE" >> $GITHUB_ENV

      - name: Check COPR status
        run: |
          cd repo
          ../rpm-tools/rpm-tool copr-status --disable-self-update --check-forked || true
          source $XDG_RUNTIME_DIR/rpm-tool-vars
          echo "COPR_STATUS=$COPR_STATUS" >> $GITHUB_ENV

      - name: Commit changes
        if: ${{ env.RPM_SPEC_UPDATE == 'true' }}
        run: |
          cd repo
          git config --local user.email "action@github.com"
          git config --local user.name "CI"
          git --no-pager diff --color=always
          echo ""
          git commit -a -m "build(github-actions): automated update [skip ci]" || true
          git push

      - name: Build on COPR
        if: ${{ env.RPM_SPEC_UPDATE == 'true' || env.COPR_STATUS == 'failed' || env.COPR_STATUS == 'forked' }}
        run: |
          cd repo
          ../rpm-tools/rpm-tool copr-build --disable-self-update
